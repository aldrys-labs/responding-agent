name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Maintains the release PR (version bump + CHANGELOG) and, when that PR is
  # merged, creates the tag and GitHub release with notes from the changelog.
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # On an actual release, cross-compile the binaries, checksum them and attach
  # them to the release release-please just created.
  binaries:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: build all targets
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          mkdir -p dist
          build() {
            out="responding-agent_$1_$2$3"
            CGO_ENABLED=0 GOOS="$1" GOARCH="$2" \
              go build -ldflags "-s -w -X main.version=${TAG}" -o "dist/${out}" ./cmd/responding-agent
          }
          build linux amd64
          build linux arm64
          build darwin amd64
          build darwin arm64
          build windows amd64 .exe
          (cd dist && sha256sum * > SHA256SUMS)

      - name: upload assets and flag pre-releases
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release upload "$TAG" dist/* --clobber
          case "$TAG" in
            v0.*|*-alpha*|*-beta*|*-rc*) gh release edit "$TAG" --prerelease ;;
          esac
